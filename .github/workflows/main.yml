# GitHub Actions workflow to build, test, and deploy React frontend
name: Deploy Frontend

# Trigger this workflow on push to main branch
on:
  push:
    branches:
      - main

jobs:
  # Build job: Builds Docker image and runs tests
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository code
      - uses: actions/checkout@v2

      # Step 2: Authenticate with Docker Hub using stored credentials
      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Step 3: Build test Docker image using development Dockerfile for testing
      - name: Build test image
        run: docker build -t rohansharma029/react-test -f Dockerfile.dev .

      # Step 4: Run npm tests in Docker container with CI=true for non-interactive mode
      - name: Run tests
        run: docker run -e CI=true rohansharma029/react-test npm test

      # Step 5: Build production Docker image using production Dockerfile
      - name: Build production image
        run: docker build -t rohansharma029/react-test:latest -f Dockerfile .

      # Step 6: Push production image to Docker Hub registry
      - name: Push production image
        run: docker push rohansharma029/react-test:latest

  # Deploy job: Deploys to AWS Elastic Beanstalk (runs only after build succeeds)
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository code
      - uses: actions/checkout@v2

      # Step 2: Deploy application to AWS Elastic Beanstalk with credentials and configuration
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: Frontend
          environment_name: Frontend-env
          version_label: ${{ github.sha }}
          region: ap-south-1
          deployment_package: Dockerrun.aws.json
